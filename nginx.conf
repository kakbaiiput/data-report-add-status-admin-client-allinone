server {
    listen 80;
    listen [::]:80;
    server_name starlink.octolink.id;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name starlink.octolink.id;

    root /var/www/starlink.octolink.id;
    index index.php;

    # SSL — sesuaikan path sertifikat
    ssl_certificate     /etc/letsencrypt/live/starlink.octolink.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/starlink.octolink.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Nonaktifkan listing direktori
    autoindex off;

    # ── Blokir akses langsung ke .html ──────────────────────────
    location ~* \.html$ {
        return 302 /;
    }

    # ── Aset statis (CSS, JS, font, gambar) ─────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff2?|ttf|svg)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── API PHP (data.php, sync.php, dll.) ──────────────────────
    location ^~ /api/ {
        try_files $uri =404;
        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # ── Main routing: semua lewat index.php ─────────────────────
    location / {
        # Tolak akses URL langsung ke index.php atau file .php lain di root
        if ($request_uri ~ "^/index\.php") {
            return 302 /;
        }

        try_files $uri /index.php$is_args$args;
    }

    # ── PHP handler untuk index.php ─────────────────────────────
    location = /index.php {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING    $query_string;
    }

    # ── Sembunyikan file sensitif ────────────────────────────────
    location ~* \.(sql|env|log|sh|git)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
    }
}
