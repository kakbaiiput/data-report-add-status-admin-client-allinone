# ================================================================
#  starlink.octolink.id  —  panel internal (token-based routing)
# ================================================================

server {
    listen 80;
    listen [::]:80;
    server_name starlink.octolink.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name starlink.octolink.id;

    root  /www/wwwroot/starlink.octolink.id;
    index index.php;

    ssl_certificate     /www/server/panel/vhost/cert/starlink.octolink.id/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/starlink.octolink.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    autoindex off;
    charset utf-8;

    # ── Anti search engine indexing ─────────────────────────────
    add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;

    # ── Izinkan robots.txt (agar SE baca Disallow) ──────────────
    location = /robots.txt {
        allow all;
        access_log off;
    }

    # ── Blokir akses langsung ke .html ──────────────────────────
    location ~* \.html$ {
        return 302 /;
    }

    # ── Blokir file sensitif & config ───────────────────────────
    # config.js, appscript-sync-vps.js, dan file berbahaya lain
    location ~* \.(sql|env|log|sh|git)$ { deny all; return 404; }
    location = /config.js              { deny all; return 404; }
    location = /appscript-sync-vps.js  { deny all; return 404; }
    location ~ /\.                     { deny all; }

    # ── Aset statis (CSS, JS, font — dibutuhkan halaman app) ────
    # Hanya boleh dimuat sebagai sub-resource, bukan direct URL browse
    location ~* \.(css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        # Tidak perlu Referer check — browser tidak selalu kirim Referer
    }

    # ── API PHP ─────────────────────────────────────────────────
    location ^~ /api/ {
        try_files $uri =404;
        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   unix:/tmp/php-cgi-83.sock;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param  QUERY_STRING    $query_string;
        }
    }

    # ── Main routing lewat index.php ────────────────────────────
    location = /index.php {
        include        fastcgi_params;
        fastcgi_pass   unix:/tmp/php-cgi-83.sock;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING    $query_string;
    }

    location / {
        if ($request_uri ~ "^/index\.php") { return 302 /; }
        try_files $uri /index.php$is_args$args;
    }
}


# ================================================================
#  client.octolink.id  —  portal publik untuk client
# ================================================================

server {
    listen 80;
    listen [::]:80;
    server_name client.octolink.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name client.octolink.id;

    root  /www/wwwroot/starlink.octolink.id;

    ssl_certificate     /www/server/panel/vhost/cert/client.octolink.id/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/client.octolink.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    autoindex off;
    charset utf-8;

    # ── Anti search engine indexing ─────────────────────────────
    add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;

    location = /robots.txt { allow all; access_log off; }

    # ── Homepage → langsung client.html ─────────────────────────
    location = / {
        try_files /client.html =404;
    }

    # ── Aset statis ─────────────────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # ── API PHP ─────────────────────────────────────────────────
    location ^~ /api/ {
        try_files $uri =404;
        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   unix:/tmp/php-cgi-83.sock;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param  QUERY_STRING    $query_string;
        }
    }

    # ── Blokir semua file lain ───────────────────────────────────
    location ~* \.(html|php|sql|env|log|sh)$ { return 403; }
    location ~ /\. { deny all; }
}
